<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown to Eid-ul-Azha</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f9f9f9;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        #countdown {
            font-size: 2rem;
            font-weight: bold;
            color: #007BFF;
        }

        footer {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #666;
        }
    </style>
</head>
<body>
    <h1>Countdown to Eid-ul-Azha</h1>
    <div id="countdown">Loading...</div>

    <footer>
        &copy; 2026 Eid Countdown
    </footer>

    <script>
        function calculateCountdown() {
            const eidDate = new Date('2026-06-28T00:00:00'); // Adjust the date for Eid-ul-Azha
            const now = new Date();
            const timeDifference = eidDate - now;

            if (timeDifference <= 0) {
                document.getElementById('countdown').textContent = "Eid-ul-Azha is here!";
                return;
            }

            const days = Math.floor(timeDifference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((timeDifference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((timeDifference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((timeDifference % (1000 * 60)) / 1000);

            document.getElementById('countdown').textContent = 
                `${days} days, ${hours} hours, ${minutes} minutes, ${seconds} seconds`;
        }

        setInterval(calculateCountdown, 1000);
    </script>
</body>
</html>
